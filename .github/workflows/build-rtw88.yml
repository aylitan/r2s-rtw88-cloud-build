name: Build patched rtw88 for iStoreOS R2S

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout build recipe
        uses: actions/checkout@v4

      - name: Free runner disk space
        shell: bash
        run: |
          set -euxo pipefail
          df -h
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          df -h

      - name: Install OpenWrt build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses-dev libssl-dev python3 python3-distutils \
            python3-setuptools python3-pyelftools rsync swig unzip zlib1g-dev file wget curl \
            jq zstd xz-utils xsltproc libelf-dev device-tree-compiler \
            ccache subversion patch quilt perl time kmod binutils

      - name: Build and validate exact-ABI packages
        shell: bash
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh

      - name: Upload validated patched packages
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: r2s-rtw88-patched-6.6.141-r2
          path: out/artifact/
          if-no-files-found: error
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r2s-rtw88-build-logs
          path: out/logs/
          if-no-files-found: warn
          retention-days: 7
